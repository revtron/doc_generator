rds_instances:
  primary_db:
  - name: "fleetconnect-staging-db"
    type: "RDS PostgreSQL"
    engine: "PostgreSQL"
    version: "17.8"
    instance_type: "db.t3.small"
    storage: "20GB"
    port: 5432
    endpoint: "fleetconnect-staging-db.calcky64suol.us-east-1.rds.amazonaws.com"
    security_group: "fleetconnect-staging-db-sg"
    privately_accessible: true
    access:
    - username: "postgres"
      password: "PKz6L0YRRWxhAmNQ"
      database: "fleetconnect-staging-db"

