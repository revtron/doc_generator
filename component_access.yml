client:
- name: "Fleet Connect"
  env: "Staging"
  cloud: "AWS"
  region: "us-east-1"
  repository_type: "monorepo"
  project_name: "Fleet Connect"

ec2_instances:
  web_server:
  - name: "managment node"
    instance_type: "t4g.medium"
    public_ip: "52.7.90.49"
    private_ip: "10.0.12.240"
    security_group: "fleetconnect-stag-management"
    used_for: "Jump Server/Bastion host"
    is_management_node: true
    alias: "bastion"
    specs:
    - cpu: "2 vCPU"
      memory: "4GB"
      storage: "30GB EBS"
    access:
    - key_pair:
      - name: "fleetconnect-stag-management-key"
        port: 10022
        content: |
          -----BEGIN RSA PRIVATE KEY-----
          
          -----END RSA PRIVATE KEY-----

  app_server:
  - name: "app-server"
    instance_type: "t4g.medium"
    public_ip: "N/A"
    private_ip: "10.0.139.54"
    security_group: "fleetconnect-app-sg"
    used_for: "Application backend ,front-end and admin-app"
    is_management_node: false
    alias: "app_server"
    specs:
    - cpu: "2 vCPU"
      memory: "4GB"
      storage: "30GB EBS"
    access:
    - key_pair:
      - name: "internal-staging"
        port: 22
        content: |
          -----BEGIN RSA PRIVATE KEY-----
          
          -----END RSA PRIVATE KEY-----

rds_instances:
  primary_db:
  - name: "fleetconnect-staging-db"
    type: "RDS PostgreSQL"
    engine: "PostgreSQL"
    version: "17.8"
    instance_type: "db.t3.small"
    storage: "20GB"
    port: 5432
    endpoint: "fleetconnect-staging-db.calcky64suol.us-east-1.rds.amazonaws.com"
    security_group: "fleetconnect-staging-db-sg"
    privately_accessible: true
    access:
    - username: "postgres"
      password: "PKz6L0YRRWxhAmNQ"
      database: "fleetconnect-staging-db"

s3_buckets:
  app_bucket:
  - name: "fleetconnect-staging-appassets"
    region: "us-east-1"
    access:
    - key: "AKIA6QKR7UDK2NDXEK7B"

  raw_bucket:
  - name: "fleetconnect-raw-staging"
    region: "us-east-1"
    access:
    - key: "N/A"

redis_instances:
  redis_server:
  - name: "redis-server"
    region: "self-hosted"
    access:
    - key: "Internal VPC access only"

ecr_repos:
  backend_service:
  - name: "fleet-connect-backend"
    region: "us-east-1"
    url: "997141225685.dkr.ecr.us-east-1.amazonaws.com/fleet-connect-backend"

  frontend_service:
  - name: "fleet-connect-frontend"
    region: "us-east-1"
    url: "997141225685.dkr.ecr.us-east-1.amazonaws.com/fleet-connect-frontend"

