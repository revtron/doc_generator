albs:
  main_alb:
  - name: "fleet-connect-alb"
    region: "us-east-1"
    listeners:
    - port: 80
      protocol: HTTP
      action: redirect
      redirect_to_port: 443

    - port: 443
      protocol: HTTPS
      certificates:
      - arn: "arn:aws:elasticloadbalancing:us-east-1:997141225685:listener/app/fleet-connect-alb/6e5eb6e1618e4af7/2de1e09cfe085374"
      rules:
      - host_header: "staging-jenkins.fleetconnect.io"
        target_group:
          name: "fleetconnect-staging-jenkins-tg"
          port: 8080
          protocol: HTTP
          target_type: "instance"
      - host_header: "staging-grafana.fleetconnect.io"
        target_group:
          name: "fleetconnect-staging-grafana-tg"
          port: 3000
          protocol: HTTP
          target_type: "ip"
      - host_header: "staging-admin.fleetconnect.io"
        target_group:
          name: "fleetconnect-staging-admin-tg"
          port: 3000
          protocol: HTTP
          target_type: "ip"

      - host_header: "staging-be.fleetconnect.io"
        target_group:
          name: "fleetconnect-staging-be-tg"
          port: 3000
          protocol: HTTP
          target_type: "instance"

      - host_header: "staging-fe.fleetconnect.io"
        target_group:
          name: "fleet-connect-web-priv-tg"
          port: 3001
          protocol: HTTP
          target_type: "ip"

app_endpoints:
  web_application: "https://staging-fe.fleetconnect.io"
  api_service: "https://staging-be.fleetconnect.io"
  admin_panel: "https://staging-admin.fleetconnect.io"

observability_endpoints:
  tools:
  - name: "grafana"
    endpoint: "https://staging-grafana.fleetconnect.io"
    credentials:
    - username: "admin"
      password: "hyKc6vnSnTRSkJZ"

  - name: "prometheus"
    endpoint: "Internal service (not publicly exposed)"

  - name: "alertmanager"
    endpoint: "Internal service"

  - name: "loki"
    endpoint: "Internal logging service"

  - name: "promtail"
    endpoint: "Agent running on nodes"

cicd_endpoints:
  jenkins:
  - name: "jenkins"
    endpoint: "https://staging-jenkins.fleetconnect.io"
    credentials:
    - username: "admin"
      password: "accc7d2ea2a54123b8832c36d7f2b0fd"

